name: Setup Kosli CLI
description: 'Wrapper for kosli-dev/setup-cli-action'

inputs:
  version:
    description: The version of the Kosli CLI to setup
    required: false
    default: latest

runs:
  using: "composite"
  if: ${{ github.ref == 'refs/heads/main' }}
  steps:
    - name: Setup Kosli CLI
      uses: kosli-dev/setup-cli-action@v5
      with:
        version: ${{ inputs.version }}
